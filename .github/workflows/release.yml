name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  AUTODCR_BIN: autodcr-bridge

jobs:
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Zip extension
        run: |
          cd dist && zip -rq ../extension.zip . && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.zip

  build-native:
    name: build-native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: autodcr-bridge-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: autodcr-bridge-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: autodcr-bridge-windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: autodcr-bridge-linux-x64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native-host

      - name: Build
        working-directory: native-host
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests (native target only)
        if: matrix.os != 'macos-13'
        working-directory: native-host
        run: cargo test --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        working-directory: native-host
        run: |
          mkdir -p stage
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/${AUTODCR_BIN}.exe" "stage/${AUTODCR_BIN}.exe"
          else
            cp "target/${{ matrix.target }}/release/${AUTODCR_BIN}" "stage/${AUTODCR_BIN}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native-host/stage/*

  package-macos:
    needs: build-native
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: autodcr-bridge-macos-arm64
          path: artifacts/macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: autodcr-bridge-macos-x64
          path: artifacts/macos-x64
      - name: Lipo universal binary
        run: |
          chmod +x artifacts/macos-arm64/${AUTODCR_BIN} artifacts/macos-x64/${AUTODCR_BIN}
          mkdir -p installer/macos/payload
          lipo -create \
            artifacts/macos-arm64/${AUTODCR_BIN} \
            artifacts/macos-x64/${AUTODCR_BIN} \
            -output installer/macos/payload/${AUTODCR_BIN}
          file installer/macos/payload/${AUTODCR_BIN}
      - name: Build .pkg
        env:
          AUTODCR_VERSION: ${{ github.ref_name }}
          AUTODCR_EXTENSION_ID: ${{ vars.AUTODCR_EXTENSION_ID }}
        run: bash installer/macos/build-pkg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: installer/macos/dist/*.pkg

  package-windows:
    needs: build-native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: autodcr-bridge-windows-x64
          path: artifacts\windows-x64
      - name: Install WiX v4
        run: dotnet tool install --global wix --version 4.0.5
      - name: Build .msi
        shell: pwsh
        env:
          AUTODCR_VERSION: ${{ github.ref_name }}
          AUTODCR_EXTENSION_ID: ${{ vars.AUTODCR_EXTENSION_ID }}
        run: installer/windows/build-msi.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: installer/windows/dist/*.msi

  package-linux:
    needs: build-native
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: autodcr-bridge-linux-x64
          path: artifacts/linux-x64
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev fakeroot
      - name: Build .deb and .rpm
        env:
          AUTODCR_VERSION: ${{ github.ref_name }}
          AUTODCR_EXTENSION_ID: ${{ vars.AUTODCR_EXTENSION_ID }}
        run: bash installer/linux/build-pkgs.sh
      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: |
            installer/linux/dist/*.deb
            installer/linux/dist/*.rpm

  release:
    needs: [build-extension, package-macos, package-windows, package-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute checksums
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.pkg" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "extension.zip" \) -exec cp {} release/ \;
          cd release && sha256sum * > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
